services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iworkg-backend
    ports:
      - "3001:3001"
    volumes:
      # Persiste o banco SQLite fora do container (usa o banco local)
      - ./backend/data:/app/data
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/categories"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iworkg-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
