services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iworkg-backend
    ports:
      - "3001:3001"
    volumes:
      # Persiste o banco SQLite fora do container
      - backend-data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iworkg-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
